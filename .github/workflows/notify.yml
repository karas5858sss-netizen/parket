name: Parket Notifications

on:
  schedule:
    # Каждые 10 минут с 6:00 до 20:00 МСК (UTC+3 = UTC-3)
    # GitHub Actions работает в UTC, МСК = UTC+3
    - cron: '0,10,20,30,40,50 3-17 * * 1-6'  # пн-сб, 06:00-20:00 МСК
  workflow_dispatch: # ручной запуск для теста

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Run notifications
        env:
          TG_TOKEN:  ${{ secrets.TG_TOKEN }}
          TG_CHATID: ${{ secrets.TG_CHATID }}
          GROUP_ID:  '271'
          VERCEL_URL: 'https://project-a2kdz.vercel.app/api/schedule'
        run: |
          node -e "
          const https = require('https');

          function get(url) {
            return new Promise((res, rej) => {
              https.get(url, r => {
                let d = '';
                r.on('data', c => d += c);
                r.on('end', () => { try { res(JSON.parse(d)); } catch(e) { rej(e); } });
              }).on('error', rej);
            });
          }

          function sendMsg(token, chatId, text) {
            return new Promise((res, rej) => {
              const body = JSON.stringify({ chat_id: chatId, text, parse_mode: 'HTML' });
              const req = https.request({
                hostname: 'api.telegram.org',
                path: '/bot' + token + '/sendMessage',
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(body) }
              }, r => { let d=''; r.on('data',c=>d+=c); r.on('end',()=>res(JSON.parse(d))); });
              req.on('error', rej);
              req.write(body);
              req.end();
            });
          }

          function pad(n) { return String(n).padStart(2,'0'); }

          function t2m(t) { const[h,m]=t.split(':').map(Number); return h*60+m; }

          const DOW = ['вс','пн','вт','ср','чт','пт','сб'];

          async function main() {
            const token   = process.env.TG_TOKEN;
            const chatId  = process.env.TG_CHATID;
            const groupId = process.env.GROUP_ID;
            const url     = process.env.VERCEL_URL + '?groupId=' + groupId;

            // Текущее московское время (UTC+3)
            const nowUTC  = new Date();
            const nowMSK  = new Date(nowUTC.getTime() + 3*60*60*1000);
            const todayStr = nowMSK.toISOString().split('T')[0];
            const nowMin  = nowMSK.getUTCHours()*60 + nowMSK.getUTCMinutes();
            const hh = pad(nowMSK.getUTCHours());
            const mm = pad(nowMSK.getUTCMinutes());

            console.log('МСК время:', hh+':'+mm, '| Дата:', todayStr);

            const data = await get(url);
            if (!data.ok || !data.lessons) { console.log('API error'); return; }

            // Пары сегодня, сортированные по времени
            const today = data.lessons
              .filter(l => l.date === todayStr)
              .sort((a,b) => t2m(a.ts) - t2m(b.ts));

            if (today.length === 0) { console.log('Сегодня пар нет'); return; }

            // ── Уведомление за 60 мин до ПЕРВОЙ пары ──────────────────
            const first = today[0];
            const firstStart = t2m(first.ts);
            const diffFirst = firstStart - nowMin;
            if (diffFirst >= 55 && diffFirst <= 65) {
              const msg =
                '🔔 <b>Первая пара через час!</b>\n\n' +
                '📚 ' + first.name + '\n' +
                '🕐 ' + first.ts + ' – ' + first.te + '\n' +
                '🏫 Ауд. ' + first.room + '\n' +
                '👤 ' + first.teacher;
              await sendMsg(token, chatId, msg);
              console.log('Отправлено: первая пара через час');
              return;
            }

            // ── Уведомление за 10 мин до КАЖДОЙ пары ──────────────────
            for (const l of today) {
              const diff = t2m(l.ts) - nowMin;
              if (diff >= 8 && diff <= 12) {
                const isFirst = l === today[0];
                const msg =
                  (isFirst ? '⚡ <b>Первая пара через 10 минут!</b>' : '⚡ <b>Следующая пара через 10 минут!</b>') + '\n\n' +
                  '📚 ' + l.name + '\n' +
                  '🕐 ' + l.ts + ' – ' + l.te + '\n' +
                  '🏫 Ауд. ' + l.room + '\n' +
                  '👤 ' + l.teacher;
                await sendMsg(token, chatId, msg);
                console.log('Отправлено: пара через 10 мин', l.ts);
                return;
              }
            }

            // ── Напоминание о ДЗ в 16:00 ──────────────────────────────
            if (nowMin >= 960 && nowMin <= 970) { // 16:00–16:10 МСК
              // ДЗ берём из отдельного хранилища — но у нас оно в TG Cloud
              // Поэтому просто напоминаем проверить приложение
              const lastLesson = today[today.length-1];
              const lastEnd = t2m(lastLesson.te);
              if (nowMin > lastEnd) { // все пары уже прошли
                const msg =
                  '📋 <b>Напоминание о домашних заданиях</b>\n\n' +
                  'Сегодня было ' + today.length + ' пар' + (today.length===1?'а':today.length<5?'ы':'') + '. ' +
                  'Проверь, не осталось ли невыполненных ДЗ в ПАР·КЕТ 👇';
                await sendMsg(token, chatId, msg);
                console.log('Отправлено: напоминание о ДЗ');
                return;
              }
            }

            console.log('Нет уведомлений для времени', hh+':'+mm);
          }

          main().catch(e => { console.error(e); process.exit(1); });
          "
